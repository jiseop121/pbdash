version: 2

builds:
  - id: pbdash
    binary: pbdash
    main: ./cmd/pbdash
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -buildid=
      - -X github.com/jiseop121/pbdash/internal/app.Version={{.Version}}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: pbdash
    name_template: "pbdash-v{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    format: tar.gz

checksum:
  name_template: "pbdash-v{{ .Version }}-checksums.txt"
  algorithm: sha256

brews:
  - name: pbdash
    homepage: "https://github.com/jiseop121/pbdash"
    description: "Read-only CLI viewer for PocketBase instances"
    directory: Formula
    repository:
      owner: jiseop121
      name: homebrew-pbdash
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "chore(formula): release pbdash {{ .Tag }}"
    test: |
      assert_match version.to_s, shell_output("#{bin}/pbdash -c \"version\"")
    install: |
      bin.install "pbdash"
